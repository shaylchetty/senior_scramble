<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramble Swiper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="app-panel">
        <div class="panel-copy">
          <p class="eyebrow">Columbia University ♔ Spring 2026</p>
          <h1>Senior Scramble</h1>
          <p class="subcopy">Sort profiles with a quick save or skip.</p>
        </div>

        <div class="search-row">
          <label class="search-field" for="search-input">
            <span class="search-label">Search Profiles</span>
            <div class="search-input-wrap">
              <input
                id="search-input"
                class="search-input"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
              <button
                id="clear-search-button"
                class="clear-search-button"
                type="button"
                aria-label="Clear search"
                title="Clear search"
              >
                &times;
              </button>
            </div>
          </label>
        </div>

        <div class="status-row">
          <button
            id="view-all-button"
            class="status-chip view-button is-active"
            type="button"
          >
            <span class="status-label">To View</span>
            <strong id="remaining-count">0</strong>
          </button>
          <button
            id="view-saved-button"
            class="status-chip view-button"
            type="button"
          >
            <span class="status-label">Saved</span>
            <strong id="saved-count">0</strong>
          </button>
          <button
            id="view-ignored-button"
            class="status-chip view-button"
            type="button"
          >
            <span class="status-label">Skipped</span>
            <strong id="ignored-count">0</strong>
          </button>
        </div>

        <div class="storage-tools">
          <button id="export-button" class="ghost-button" type="button">
            Export
          </button>
          <button id="import-button" class="ghost-button" type="button">
            Import
          </button>
          <button id="reset-button" class="ghost-button" type="button">
            Reset
          </button>
          <input
            id="import-input"
            type="file"
            accept="application/json"
            hidden
          />
        </div>
      </section>

      <section class="deck-panel">
        <div class="deck-frame">
          <div id="card-deck" class="card-deck" aria-live="polite"></div>
          <div id="collection-view" class="collection-view" hidden></div>

          <div class="action-row">
            <button
              id="rewind-button"
              class="action-button action-rewind"
              type="button"
              aria-label="Rewind"
              title="Rewind"
            >
              &#8630;
            </button>
            <button
              id="ignore-button"
              class="action-button action-ignore"
              type="button"
            >
              Skip
            </button>
            <button
              id="save-button"
              class="action-button action-save"
              type="button"
            >
              Save
            </button>
          </div>
        </div>
      </section>
    </main>

    <template id="profile-card-template">
      <article class="profile-card">
        <div class="swipe-indicator swipe-indicator-left">Skip</div>
        <div class="swipe-indicator swipe-indicator-right">Save</div>
        <img class="profile-image" alt="" />
        <div class="card-gradient"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="identity-row">
              <div>
                <h2 class="profile-name"></h2>
                <div class="meta-row">
                  <p class="profile-school"></p>
                  <a
                    class="profile-instagram"
                    target="_blank"
                    rel="noreferrer noopener"
                  ></a>
                </div>
              </div>
            </div>
          </div>

          <div class="card-bottom">
            <div class="detail-grid">
              <div class="detail-pill major-wrapper">
                <span class="detail-label">Major</span>
                <span class="profile-major"></span>
              </div>
              <div class="detail-pill detail-pill-optional minor-wrapper">
                <span class="detail-label">Minor</span>
                <span class="profile-minor"></span>
              </div>
              <div class="detail-pill detail-pill-optional orientation-wrapper">
                <span class="detail-label">Orientation</span>
                <span class="profile-orientation"></span>
              </div>
              <div class="detail-pill zodiac-wrapper">
                <span class="detail-label">Star Sign</span>
                <span class="profile-zodiac"></span>
              </div>
            </div>

            <p class="profile-bio"></p>
            <blockquote class="profile-quote"></blockquote>
          </div>
        </div>
      </article>
    </template>

    <template id="collection-card-template">
      <article class="collection-card">
        <div class="collection-image-wrap">
          <img class="collection-image" alt="" />
        </div>
        <div class="collection-body">
          <div class="collection-head">
            <div>
              <h2 class="profile-name"></h2>
              <p class="profile-school"></p>
            </div>
            <a
              class="profile-instagram"
              target="_blank"
              rel="noreferrer noopener"
            ></a>
          </div>
          <div class="detail-grid">
            <div class="detail-pill major-wrapper">
              <span class="detail-label">Major</span>
              <span class="profile-major"></span>
            </div>
            <div class="detail-pill minor-wrapper">
              <span class="detail-label">Minor</span>
              <span class="profile-minor"></span>
            </div>
            <div class="detail-pill orientation-wrapper">
              <span class="detail-label">Orientation</span>
              <span class="profile-orientation"></span>
            </div>
            <div class="detail-pill zodiac-wrapper">
              <span class="detail-label">Star Sign</span>
              <span class="profile-zodiac"></span>
            </div>
          </div>
          <p class="profile-bio"></p>
          <blockquote class="profile-quote"></blockquote>
          <div class="collection-actions">
            <button class="collection-move-button" type="button"></button>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
